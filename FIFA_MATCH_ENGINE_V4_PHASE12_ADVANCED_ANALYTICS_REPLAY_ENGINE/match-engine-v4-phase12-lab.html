<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Match Engine V4 — Phase 12 Analytics Lab</title>
<style>
:root{font-family:Inter,system-ui,sans-serif;color:#edf7f8;background:#06141c}*{box-sizing:border-box}body{margin:0;padding:18px;background:radial-gradient(circle at top,#174353,#06141c 58%)}main{max-width:1320px;margin:auto}.head,.panel{background:rgba(6,27,38,.96);border:1px solid rgba(123,211,234,.22);border-radius:16px;box-shadow:0 22px 60px rgba(0,0,0,.35)}.head{padding:18px;margin-bottom:12px}.head small{color:#f1ce72;font-weight:950;letter-spacing:.12em}.head h1{margin:6px 0}.head p{margin:0;color:#a6c1ca}.controls{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}.controls button,.controls select{border:1px solid rgba(255,255,255,.16);border-radius:8px;background:#103644;color:#eaf5f7;padding:8px 10px;font-weight:900;cursor:pointer}.controls button.primary{background:#755d22;color:#fff0b4}.layout{display:grid;grid-template-columns:310px 1fr;gap:12px}.panel{padding:12px}.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.kpi{background:#09232e;border-radius:10px;padding:9px}.kpi span{display:block;color:#88aab4;font-size:9px;font-weight:900}.kpi b{color:#f1d174;font-size:18px}.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}.tab{border:1px solid rgba(255,255,255,.14);background:#123744;color:#cde3e8;border-radius:7px;padding:7px 9px;font-size:10px;font-weight:900;cursor:pointer}.tab.active{background:#755d22;color:#fff0b4}.view{min-height:620px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.card{background:#08212b;border-radius:12px;padding:10px}.card h3{margin:0 0 8px;color:#f1cf71}.pitch{width:100%;aspect-ratio:100/68;border-radius:10px;background:repeating-linear-gradient(90deg,#17623e 0 10%,#1b6b43 10% 20%);position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.28)}svg.pitch{display:block}.heat{display:grid;grid-template-columns:repeat(12,1fr);aspect-ratio:100/68;border-radius:10px;overflow:hidden;background:#123d31}.heat i{border:1px solid rgba(255,255,255,.025)}table{width:100%;border-collapse:collapse;font-size:11px}th,td{padding:6px;border-bottom:1px solid rgba(255,255,255,.07);text-align:right}th:first-child,td:first-child{text-align:left}.rating{color:#f1d174;font-weight:950}.momentum{display:grid;grid-template-columns:repeat(18,1fr);gap:3px;height:220px;align-items:end}.mbar{height:100%;display:flex;flex-direction:column;justify-content:flex-end;gap:2px}.homebar{background:#3ab0e5}.awaybar{background:#ef7568}.timeline{display:grid;gap:6px}.event{display:grid;grid-template-columns:44px 100px 1fr;gap:8px;background:#09232e;padding:8px;border-radius:8px;font-size:11px}.event b{color:#f1cf71}.replay-player{position:absolute;transform:translate(-50%,-50%);width:15px;height:15px;border-radius:50%;border:1px solid #fff}.replay-player.home{background:#2998d3}.replay-player.away{background:#d75549}.ball{position:absolute;transform:translate(-50%,-50%);width:8px;height:8px;background:#fff;border:2px solid #111;border-radius:50%}.muted{color:#90abb4;font-size:11px}.status{margin-top:10px;padding:9px;background:#08212b;border-radius:9px;color:#bed1d6}@media(max-width:920px){.layout{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}.view{min-height:auto}}
</style>
</head>
<body><main>
<section class="head"><small>PHASE 12 · ADVANCED ANALYTICS & FULL REPLAY</small><h1>Maç Analizi Laboratuvarı</h1><p>Resmî event akışından shot map, pass map, heatmap, xG/xGOT/xT, momentum, oyuncu rating’i ve replay arşivi üretir.</p><div class="controls"><button class="primary" id="full">Tam Maçı Oynat</button><button id="half">45 Dakika</button><button id="reset">Yeni Seed</button><select id="clip"></select><button id="playClip">Replay Oynat</button></div></section>
<div class="layout"><aside class="panel"><div class="kpis"><div class="kpi"><span>SKOR</span><b id="score">0–0</b></div><div class="kpi"><span>DAKİKA</span><b id="minute">0</b></div><div class="kpi"><span>xG</span><b id="xg">0–0</b></div><div class="kpi"><span>xT</span><b id="xt">0–0</b></div><div class="kpi"><span>ŞUT</span><b id="shots">0–0</b></div><div class="kpi"><span>KEY PASS</span><b id="keys">0–0</b></div><div class="kpi"><span>REPLAY FRAME</span><b id="frames">0</b></div><div class="kpi"><span>KLİP</span><b id="clips">0</b></div></div><div class="status" id="status">Motor hazır.</div></aside>
<section class="panel"><div class="tabs" id="tabs"></div><div class="view" id="view"></div></section></div>
</main>
<script src="manager-match-engine-v4-phase12.bundle.js"></script>
<script>
const core=window.FIFA_MATCH_ENGINE_V4,$=id=>document.getElementById(id);let engine,seed=1,tab='summary',replayTimer=null;
const tabs=['summary','momentum','shots','passes','heatmap','players','timeline','replay'];
$('tabs').innerHTML=tabs.map(x=>`<button class="tab" data-tab="${x}">${x.toUpperCase()}</button>`).join('');$('tabs').querySelectorAll('button').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()});
function make(){if(replayTimer)clearInterval(replayTimer);engine=core.createEngine(core.createDefaultConfig({seed:`phase12-lab-${seed}`,matchId:`phase12-lab-${seed}`}));render()}
function report(){return engine.getAnalytics()}
function pitchSvg(items,mode){return `<svg class="pitch" viewBox="0 0 100 68" preserveAspectRatio="none"><rect x="1" y="1" width="98" height="66" fill="none" stroke="rgba(255,255,255,.75)" stroke-width=".4"/><line x1="50" y1="1" x2="50" y2="67" stroke="rgba(255,255,255,.65)" stroke-width=".35"/><circle cx="50" cy="34" r="8" fill="none" stroke="rgba(255,255,255,.65)" stroke-width=".35"/>${items.map(x=>mode==='shots'?`<circle cx="${x.from.x}" cy="${x.from.y}" r="${.8+Math.sqrt(Math.max(.01,x.xg))*3}" fill="${x.goal?'#f4d15f':x.onTarget?'#55c8ee':'#ef7568'}" opacity=".86"><title>xG ${x.xg.toFixed(2)} · ${x.outcome}</title></circle>`:`<line x1="${x.from.x}" y1="${x.from.y}" x2="${x.to.x}" y2="${x.to.y}" stroke="${x.completed?(x.side==='home'?'#55c8ee':'#ef7568'):'#6b7d84'}" stroke-width="${x.progressive?.55:.25}" opacity="${x.completed?.55:.25}"/>`).join('')}</svg>`}
function heat(grid){return `<div class="heat">${grid.flat().map(v=>`<i style="background:rgba(242,199,75,${v*.84})"></i>`).join('')}</div>`}
function playerTable(rows){return `<table><thead><tr><th>Oyuncu</th><th>Rtg</th><th>G</th><th>A</th><th>xG</th><th>xA</th><th>xT</th></tr></thead><tbody>${rows.map(p=>`<tr><td>${p.name}</td><td class="rating">${p.rating}</td><td>${p.goals}</td><td>${p.assists}</td><td>${p.xg.toFixed(2)}</td><td>${p.expectedAssists.toFixed(2)}</td><td>${(p.xtPass+p.xtCarry).toFixed(2)}</td></tr>`).join('')}</tbody></table>`}
function render(){const s=engine.getSnapshot(),r=report(),h=r.teams.home,a=r.teams.away;$('score').textContent=`${s.score.home}–${s.score.away}`;$('minute').textContent=Math.floor(s.minute);$('xg').textContent=`${h.xg.toFixed(2)}–${a.xg.toFixed(2)}`;$('xt').textContent=`${h.xt.toFixed(2)}–${a.xt.toFixed(2)}`;$('shots').textContent=`${h.shots}–${a.shots}`;$('keys').textContent=`${h.keyPasses}–${a.keyPasses}`;$('frames').textContent=r.replayArchive.frameCount;$('clips').textContent=r.replayArchive.clips.length;$('status').textContent=`${s.status.toUpperCase()} · ${r.passMap.length} pas · ${r.possessionChains.length} hücum zinciri`;$('tabs').querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));$('clip').innerHTML=r.replayArchive.clips.map(c=>`<option value="${c.id}">${Math.floor(c.second/60)}' · ${c.type} · ${c.frames.length} frame</option>`).join('')||'<option>Henüz klip yok</option>';
let html='';if(tab==='summary')html=`<div class="grid2"><div class="card"><h3>SHOT MAP</h3>${pitchSvg(r.shotMap,'shots')}</div><div class="card"><h3>TOP PLAYERS</h3>${playerTable(r.players.slice(0,10))}</div></div>`;else if(tab==='momentum'){const max=Math.max(1,...r.momentum.flatMap(x=>[x.home,x.away]));html=`<div class="card"><h3>5 DAKİKALIK MOMENTUM</h3><div class="momentum">${r.momentum.slice(0,18).map(x=>`<div class="mbar" title="${x.from}-${x.to}'"><i class="awaybar" style="height:${x.away/max*48}%"></i><i class="homebar" style="height:${x.home/max*48}%"></i></div>`).join('')}</div></div>`}else if(tab==='shots')html=`<div class="grid2"><div class="card"><h3>SHOT MAP</h3>${pitchSvg(r.shotMap,'shots')}</div><div class="card"><h3>ŞUTLAR</h3><table><tbody>${r.shotMap.slice().reverse().map(x=>`<tr><td>${x.minute}'</td><td>${x.playerId}</td><td>${x.xg.toFixed(2)}</td><td>${x.outcome}</td></tr>`).join('')}</tbody></table></div></div>`;else if(tab==='passes')html=`<div class="grid2"><div class="card"><h3>PASS MAP</h3>${pitchSvg(r.passMap.slice(-120),'passes')}</div><div class="card"><h3>PASS NETWORK</h3><table><tbody>${r.passNetwork.slice(0,18).map(x=>`<tr><td>${x.fromId} → ${x.toId}</td><td>${x.passes}</td><td>${x.xt.toFixed(3)}</td></tr>`).join('')}</tbody></table></div></div>`;else if(tab==='heatmap')html=`<div class="grid2"><div class="card"><h3>HOME</h3>${heat(r.heatmaps.home)}</div><div class="card"><h3>AWAY</h3>${heat(r.heatmaps.away)}</div></div>`;else if(tab==='players')html=`<div class="card"><h3>OYUNCU PERFORMANSI</h3>${playerTable(r.players)}</div>`;else if(tab==='timeline')html=`<div class="timeline">${r.timeline.slice().reverse().map(x=>`<div class="event"><b>${x.minute}'</b><span>${x.category}</span><span>${x.type} · ${x.playerId||''}</span></div>`).join('')||'<p class="muted">Event yok.</p>'}</div>`;else html=`<div class="card"><h3>REPLAY PLAYER</h3><div class="pitch" id="replayPitch"></div><p class="muted">Üstteki klip listesinden bir event seçip Replay Oynat'a bas.</p></div>`;$('view').innerHTML=html}
function playClip(){const id=$('clip').value,clip=engine.getReplayClip(id);if(!clip?.frames?.length)return;tab='replay';render();const pitch=$('replayPitch');let i=0;if(replayTimer)clearInterval(replayTimer);replayTimer=setInterval(()=>{const f=clip.frames[i++];if(!f){clearInterval(replayTimer);return}pitch.innerHTML='';f.players.forEach((p,index)=>{const n=document.createElement('i');n.className=`replay-player ${index<11?'home':'away'}`;n.style.left=`${p[1]}%`;n.style.top=`${p[2]/68*100}%`;pitch.appendChild(n)});const b=document.createElement('i');b.className='ball';b.style.left=`${f.ball[0]}%`;b.style.top=`${f.ball[1]/68*100}%`;pitch.appendChild(b)},120)}
$('full').onclick=()=>{$('status').textContent='Tam maç hesaplanıyor…';setTimeout(()=>{engine.runFullMatch();render()},20)};$('half').onclick=()=>{engine.runTo(45*60);render()};$('reset').onclick=()=>{seed++;make()};$('playClip').onclick=playClip;make();
</script>
</body></html>
