<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ME4 Phase 13 Balance Lab</title><style>
:root{font-family:Inter,system-ui,sans-serif;color:#edf7f8;background:#07151a}*{box-sizing:border-box}body{margin:0;padding:22px;background:radial-gradient(circle at top,#244d3b,#07151a 58%)}main{max-width:1180px;margin:auto}.hero,.panel{background:rgba(7,29,31,.95);border:1px solid rgba(184,229,171,.2);border-radius:16px;box-shadow:0 20px 60px #0007}.hero{padding:18px 20px;margin-bottom:14px}.hero small{color:#d9e778;font-weight:950;letter-spacing:.13em}.hero h1{margin:6px 0}.hero p{margin:0;color:#aec8c4}.grid{display:grid;grid-template-columns:330px 1fr;gap:14px}.panel{padding:14px}label{display:block;color:#9ebbb4;font-size:10px;font-weight:950;margin:9px 0 4px}select,input,button{width:100%;padding:10px;border-radius:9px;border:1px solid #ffffff25;background:#12362e;color:#eef9f1;font-weight:850}button{margin-top:9px;cursor:pointer;background:#526629}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.kpi{background:#0b2926;border-radius:10px;padding:10px}.kpi span{display:block;color:#91aea7;font-size:9px;font-weight:900}.kpi b{display:block;color:#e2e97e;font-size:18px;margin-top:4px}.checks{margin-top:10px;display:grid;gap:6px}.check{display:grid;grid-template-columns:1fr 100px 80px;gap:8px;background:#0a2725;padding:8px;border-radius:8px;font-size:11px}.PASS{color:#7fe09c}.WARN{color:#f0cf73}.FAIL{color:#ff837a}pre{white-space:pre-wrap;background:#061c1b;padding:10px;border-radius:9px;color:#b8d1ca;max-height:330px;overflow:auto}.bar{height:12px;background:#173b31;border-radius:8px;overflow:hidden;margin:8px 0}.bar i{display:block;height:100%;background:#d9de68;width:0}@media(max-width:850px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}</style></head><body><main><section class="hero"><small>PHASE 13 · GRAND CALIBRATION & BALANCE</small><h1>Masterpiece Balance Laboratory</h1><p>Seed havuzunda deterministik maçlar çalıştırır, KPI hedeflerini kontrol eder ve otomatik tuning önerileri üretir.</p></section><div class="grid"><aside class="panel"><label>Balance profili</label><select id="profile"><option value="masterpiece">Masterpiece Balanced R1</option><option value="neutral">Neutral</option><option value="controlled">Controlled</option><option value="aggressive">Aggressive</option></select><label>Maç sayısı</label><select id="matches"><option>2</option><option selected>4</option><option>8</option></select><label>Seed prefix</label><input id="seed" value="phase13-browser-lab"><button id="run">Kalibrasyonu çalıştır</button><button id="det">Determinism audit</button><div class="bar"><i id="progress"></i></div><pre id="log">Hazır.</pre></aside><section class="panel"><div class="kpis"><div class="kpi"><span>BALANCE SCORE</span><b id="score">—</b></div><div class="kpi"><span>GOL / MAÇ</span><b id="goals">—</b></div><div class="kpi"><span>ŞUT / MAÇ</span><b id="shots">—</b></div><div class="kpi"><span>PASS ACC.</span><b id="pass">—</b></div><div class="kpi"><span>HOME WIN</span><b id="home">—</b></div><div class="kpi"><span>DRAW</span><b id="draw">—</b></div><div class="kpi"><span>STRONG NON-LOSS</span><b id="strong">—</b></div><div class="kpi"><span>FINGERPRINT</span><b id="finger">—</b></div></div><div class="checks" id="checks"></div></section></div></main><script src="manager-match-engine-v4-phase13.bundle.js"></script><script>
const $=id=>document.getElementById(id),core=window.FIFA_MATCH_ENGINE_V4;function pct(x){return Math.round(Number(x||0)*100)+'%'}
$('run').onclick=()=>{const total=Number($('matches').value);$('log').textContent='Çalışıyor...';$('progress').style.width='0%';setTimeout(()=>{try{const r=core.runCalibration({matches:total,seedPrefix:$('seed').value,profile:$('profile').value,onProgress:p=>$('progress').style.width=(p.completed/p.total*100)+'%'});$('score').textContent=r.evaluation.score+' / 100';$('goals').textContent=r.metrics.goalsPerMatch;$('shots').textContent=r.metrics.shotsPerMatch;$('pass').textContent=r.metrics.passAccuracy+'%';$('home').textContent=pct(r.metrics.homeWinRate);$('draw').textContent=pct(r.metrics.drawRate);$('strong').textContent=pct(r.metrics.strongerTeamNonLossRate);$('finger').textContent=r.fingerprint;$('checks').innerHTML=Object.entries(r.evaluation.checks).map(([k,v])=>`<div class="check"><b>${k}</b><span>${v.value} [${v.min}–${v.max}]</span><strong class="${v.status}">${v.status}</strong></div>`).join('');$('log').textContent=JSON.stringify({recommendations:r.recommendations,runtimeMs:r.elapsedMs},null,2)}catch(e){$('log').textContent=e.stack||e}},50)};
$('det').onclick=()=>{ $('log').textContent='Determinism audit çalışıyor...';setTimeout(()=>{$('log').textContent=JSON.stringify(core.runDeterminismAudit({matches:1,seedPrefix:$('seed').value}),null,2)},50)};
</script></body></html>
