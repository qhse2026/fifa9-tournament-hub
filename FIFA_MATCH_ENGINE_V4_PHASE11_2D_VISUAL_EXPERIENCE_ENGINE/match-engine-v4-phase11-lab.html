<!doctype html>
<html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ME4 Phase 11 Visual Lab</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#06141c;color:#e9f7f9;font-family:Inter,system-ui;padding:18px}main{max-width:1250px;margin:auto}.head,.box{background:#09232f;border:1px solid rgba(126,211,235,.2);border-radius:16px;box-shadow:0 20px 55px rgba(0,0,0,.32)}.head{padding:18px;margin-bottom:14px}.head small{color:#f3d371;font-weight:950;letter-spacing:.12em}.head h1{margin:6px 0}.head p{margin:0;color:#a8c3cb}.grid{display:grid;grid-template-columns:300px 1fr;gap:14px}.box{padding:13px}.manager-2d-pitch{position:relative;aspect-ratio:100/68;background:repeating-linear-gradient(90deg,#1d7547 0 10%,#23814e 10% 20%);border:3px solid rgba(255,255,255,.75);border-radius:14px}.manager-2d-pitch:before{content:"";position:absolute;inset:4%;border:2px solid rgba(255,255,255,.7)}[data-motion-player]{position:absolute;width:25px;height:25px;border-radius:50%;transform:translate(-50%,-50%);display:grid;place-items:center;border:2px solid white;font-weight:950;font-size:9px;z-index:25}[data-side=home]{background:#1475b4}[data-side=away]{background:#c64e45}[data-live-ball]{position:absolute;width:10px;height:10px;border-radius:50%;background:white;border:2px solid #111;transform:translate(-50%,-50%);z-index:30}.controls{display:grid;gap:8px}button,select{background:#12394a;color:white;border:1px solid rgba(255,255,255,.2);border-radius:9px;padding:9px;font-weight:900;cursor:pointer}.stat{background:#071b25;padding:10px;border-radius:10px;margin-top:8px}.stat span{display:block;color:#91aeb8;font-size:10px}.stat b{font-size:18px;color:#f0d174}@media(max-width:850px){.grid{grid-template-columns:1fr}}
</style></head><body><main><section class="head"><small>PHASE 11 · 2D VISUAL EXPERIENCE</small><h1>Animasyon, Kamera ve Replay Laboratuvarı</h1><p>Görsel katman simülasyon sonucunu değiştirmeden snapshot’ları 60 FPS görünümüne dönüştürür.</p></section><div class="grid"><aside class="box controls"><select id="camera"><option value="BROADCAST">Broadcast</option><option value="TACTICAL">Tactical</option><option value="FOLLOW_BALL">Follow Ball</option><option value="HIGHLIGHT">Highlight</option></select><button id="play">Maçı oynat</button><button id="shot">Şut sekansı</button><button id="corner">Korner sekansı</button><button id="replay">Son 7 saniye replay</button><button id="reset">Yeni seed</button><div class="stat"><span>DAKİKA / SKOR</span><b id="score">0' · 0–0</b></div><div class="stat"><span>SON EVENT</span><b id="event">—</b></div><div class="stat"><span>VISUAL STATUS</span><b id="status">—</b></div></aside><section class="box"><div class="manager-2d-pitch" id="pitch"><div data-live-ball></div></div></section></div></main>
<script src="manager-match-engine-v4-phase11.bundle.js"></script><script>
const core=window.FIFA_MATCH_ENGINE_V4,visual=window.FIFA_MATCH_ENGINE_V4_PHASE11_LIVE,pitch=document.getElementById('pitch');let engine,seed=1,running=false,last=performance.now();
function makeNodes(){pitch.querySelectorAll('[data-motion-player]').forEach(n=>n.remove());['home','away'].forEach(side=>{for(let i=0;i<11;i++){const n=document.createElement('div');n.dataset.motionPlayer='';n.dataset.side=side;n.dataset.index=i;n.textContent=i+1;pitch.appendChild(n)}})}
function reset(){engine=core.createEngine(core.createDefaultConfig({seed:`phase11-lab-${seed}`}));makeNodes();draw()}
function draw(){const s=engine.getSnapshot();visual.renderSimulation(pitch,s,performance.now());document.getElementById('score').textContent=`${Math.floor(s.minute)}' · ${s.score.home}–${s.score.away}`;document.getElementById('event').textContent=s.lastEvent?.type||'—';document.getElementById('status').textContent=`${visual.getStatus().cameraMode} · ${visual.getStatus().replayActive?'REPLAY':'LIVE'}`}
function loop(now){if(running){const dt=Math.min(.12,(now-last)/1000);engine.step(dt*8);draw()}last=now;requestAnimationFrame(loop)}
document.getElementById('camera').onchange=e=>visual.setCameraMode(e.target.value);document.getElementById('play').onclick=()=>running=!running;document.getElementById('shot').onclick=()=>{const s=engine.getSnapshot();const p=s.teams.home.players.find(p=>p.group!=='GK');engine.debugStartShot(p.id,{shotType:'POWER',source:'LAB'});running=true};document.getElementById('corner').onclick=()=>{engine.debugStartSetPiece('CORNER','home',{routine:'far-post'});running=true};document.getElementById('replay').onclick=()=>visual.startReplay(7);document.getElementById('reset').onclick=()=>{seed++;running=false;reset()};reset();requestAnimationFrame(loop);
</script></body></html>
